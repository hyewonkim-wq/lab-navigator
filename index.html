<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lab Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root[data-theme="dark"] {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1f1f1f;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f542;
    --accent2: #3b82f6;
    --card: #161616;
    --card-hover: #1f1f1f;
    --badge: #1a1a1a;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  :root[data-theme="light"] {
    --bg: #f5f0e8;
    --bg2: #ede8df;
    --bg3: #e4ddd3;
    --border: #d4cdc4;
    --text: #1a1a1a;
    --text2: #666;
    --text3: #aaa;
    --accent: #2d6a00;
    --accent2: #1e40af;
    --card: #faf7f2;
    --card-hover: #f0ece4;
    --badge: #e8e2d8;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--text2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    cursor: pointer;
  }

  .theme-btn {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text3);
  }
  .theme-btn.active { background: var(--accent); color: #000; }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
  }

  #searchInput {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px 7px 36px;
    font-size: 13px;
    color: var(--text);
    width: 200px;
    outline: none;
    font-family: 'Pretendard', sans-serif;
    transition: border-color 0.2s, width 0.3s;
  }
  #searchInput:focus { border-color: var(--accent); width: 240px; }
  #searchInput::placeholder { color: var(--text3); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  .hero { margin-bottom: 48px; }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { font-size: 14px; color: var(--text2); }

  /* STATS */
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    padding: 16px 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: var(--text3); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .tab-count { font-family: 'DM Mono', monospace; font-size: 10px; margin-left: 5px; opacity: 0.6; }

  /* SUB FILTERS */
  .sub-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .sub-filter-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .sub-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .sub-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 8px;
  }

  .sub-btn {
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .sub-btn:hover { color: var(--text); border-color: var(--text3); }
  .sub-btn.active-status {
    background: rgba(34, 197, 94, 0.1);
    border-color: rgba(34, 197, 94, 0.4);
    color: #22c55e;
  }
  .sub-btn.deprecated-status {
    background: rgba(100, 100, 100, 0.1);
    border-color: rgba(100, 100, 100, 0.3);
    color: var(--text3);
  }
  .sub-btn.year-btn.active-year {
    background: rgba(200, 245, 66, 0.1);
    border-color: rgba(200, 245, 66, 0.3);
    color: var(--accent);
  }

  /* SECTION */
  .section { margin-bottom: 48px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-decoration: none;
    display: block;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card.is-deprecated {
    opacity: 0.5;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.is-deprecated::before {
    background: var(--text3);
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--text3);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .card:hover::before { opacity: 1; }
  .card.is-deprecated:hover { opacity: 0.7; }

  /* CARD TOP: left type chip + right status */
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  /* 왼쪽: 아이콘 + 타입명 */
  .card-type {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .card-type-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-type-icon.sheet {
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
  }
  .card-type-icon.folder {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  .card-type-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .card-type-label.sheet { color: #22c55e; }
  .card-type-label.folder { color: #f59e0b; }

  /* 오른쪽: status pill */
  .status-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 99px;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .status-pill.active {
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: #22c55e;
  }
  .status-pill.deprecated {
    background: rgba(100, 100, 100, 0.08);
    border: 1px solid rgba(100, 100, 100, 0.2);
    color: var(--text3);
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    letter-spacing: -0.01em;
  }
  .card.is-deprecated .card-title {
    text-decoration: line-through;
    text-decoration-color: var(--text3);
  }

  .card-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }

  .card-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-url {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }
  .card-arrow {
    color: var(--text3);
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  :root[data-theme="light"] .tab.active { color: #fff; }
  :root[data-theme="light"] .sub-btn.year-btn.active-year { color: var(--accent); }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 32px 16px 60px; }
    .stats { gap: 16px; flex-wrap: wrap; }
    .grid { grid-template-columns: 1fr; }
    #searchInput { width: 140px; }
    #searchInput:focus { width: 160px; }
  }
</style>
</head>

<header>

    </div>
    <div class="theme-toggle">
      <button class="theme-btn" id="btn-light" onclick="setTheme('light')">LIGHT</button>
      <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')">DARK</button>
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-label">Research Data Hub</div>
    <h1><em>METEOR</em> R&D 연구 <em>트래킹</em><br/>대시보드</h1>
    <p>여기저기 흩어진 연구의 구슬 조각을 모으는 중...</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statCat">5</div>
      <div class="stat-label">카테고리</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statActive">-</div>
      <div class="stat-label">사용 중</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statDeprecated">-</div>
      <div class="stat-label">미사용</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="filterTab('all', this)">전체 <span class="tab-count" id="cnt-all"></span></button>
    <button class="tab" onclick="filterTab('plan', this)">계획/관리 <span class="tab-count" id="cnt-plan"></span></button>
    <button class="tab" onclick="filterTab('experiment', this)">실험 트래킹 <span class="tab-count" id="cnt-experiment"></span></button>
    <button class="tab" onclick="filterTab('reagent', this)">시약/소모품 <span class="tab-count" id="cnt-reagent"></span></button>
    <button class="tab" onclick="filterTab('docs', this)">연구 문서 <span class="tab-count" id="cnt-docs"></span></button>
    <button class="tab" onclick="filterTab('receipt', this)">결제 관리 <span class="tab-count" id="cnt-receipt"></span></button>
  </div>

  <!-- SUB FILTERS -->
  <div class="sub-filters" id="subFilters">
    <!-- STATUS 필터 -->
    <div class="sub-filter-group">
      <span class="sub-label">STATUS</span>
      <button class="sub-btn active-status" id="btn-active" onclick="filterStatus('active')">ACTIVE</button>
      <button class="sub-btn" id="btn-deprecated" onclick="filterStatus('deprecated')">DEPRECATED</button>
    </div>

    <!-- YEAR 필터 (계획/관리 탭일 때만 표시) -->
    <div class="sub-divider" id="yearDivider" style="display:none;"></div>
    <div class="sub-filter-group" id="yearGroup" style="display:none;">
      <span class="sub-label">YEAR</span>
      <button class="sub-btn year-btn" id="btn-2025" onclick="filterYear(2025)">2025</button>
      <button class="sub-btn year-btn" id="btn-2026" onclick="filterYear(2026)">2026</button>
    </div>
  </div>

  <div id="cardContainer"></div>
  <div class="empty" id="emptyMsg" style="display:none;">검색 결과가 없습니다.</div>
</main>

    },
    {
      id: 10,
      category: "receipt",
      categoryLabel: "결제 관리",
      title: "AI 구독 서비스",
      desc: "AI 구독 서비스 영수증/청구서 제출",
      type: "folder",
      typeLabel: "Google Drive",
      year: null,
      status: "active",
      url: "https://drive.google.com/drive/u/0/folders/1zh0-skrFSE0moBmoTGCDV8VtP9bkUpfY",
      shortUrl: "drive.google.com/drive/folders"
    },
    {
      id: 11,
      category: "receipt",
      categoryLabel: "결제 관리",
      title: "거래명세서",
      desc: "거래명세서 업로드",
      type: "folder",
      typeLabel: "Google Drive",
      year: null,
      status: "active",
      url: "https://drive.google.com/drive/folders/1a5hJcfi0vPrfA_bSdytT3sDZvJZ-QoNH",
      shortUrl: "drive.google.com/drive/folders"
    }
  ];

  let currentTab    = "all";
  let currentStatus = "active";   // "active" | "deprecated"
  let currentYear   = null;       // null | 2025 | 2026
  let currentSearch = "";

  /* ── SVG 아이콘 ── */
  function getTypeIcon(type) {
    if (type === "sheet") {
      return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>`;
    }
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>`;
  }

  /* ── 탭별 카운트 업데이트 ── */
  function updateTabCounts() {
    const categories = ["all", "plan", "experiment", "reagent", "docs", "receipt"];
    categories.forEach(cat => {
      const el = document.getElementById("cnt-" + cat);
      if (!el) return;
      const count = cat === "all"
        ? DATA.length
        : DATA.filter(d => d.category === cat).length;
      el.textContent = count;
    });

    const activeCount     = DATA.filter(d => d.status === "active").length;
    const deprecatedCount = DATA.filter(d => d.status === "deprecated").length;
    document.getElementById("statTotal").textContent      = DATA.length;
    document.getElementById("statActive").textContent     = activeCount;
    document.getElementById("statDeprecated").textContent = deprecatedCount;
  }

  /* ── STATUS 필터 ── */
  function filterStatus(status) {
    currentStatus = status;
    document.getElementById("btn-active").className      = "sub-btn" + (status === "active"      ? " active-status"     : "");
    document.getElementById("btn-deprecated").className  = "sub-btn" + (status === "deprecated"  ? " deprecated-status" : "");
    renderCards();
  }

  /* ── YEAR 필터 ── */
  function filterYear(year) {
    if (currentYear === year) {
      currentYear = null;
    } else {
      currentYear = year;
    }
    document.getElementById("btn-2025").className = "sub-btn year-btn" + (currentYear === 2025 ? " active-year" : "");
    document.getElementById("btn-2026").className = "sub-btn year-btn" + (currentYear === 2026 ? " active-year" : "");
    renderCards();
  }

  /* ── TAB 필터 ── */
  function filterTab(tab, el) {
    currentTab  = tab;
    currentYear = null;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    const showYear = tab === "plan";
    document.getElementById("yearGroup").style.display  = showYear ? "flex" : "none";
    document.getElementById("yearDivider").style.display = showYear ? "block" : "none";
    document.getElementById("btn-2025").className = "sub-btn year-btn";
    document.getElementById("btn-2026").className = "sub-btn year-btn";

    renderCards();
  }

  /* ── 검색 ── */
  function filterCards(val) {
    currentSearch = val;
    renderCards();
  }

  /* ── 카드 렌더링 ── */
  function renderCards() {
    const container = document.getElementById("cardContainer");
    const empty     = document.getElementById("emptyMsg");

    let filtered = DATA;

    if (currentTab !== "all") {
      filtered = filtered.filter(d => d.category === currentTab);
    }

    filtered = filtered.filter(d => d.status === currentStatus);

    if (currentTab === "plan" && currentYear !== null) {
      filtered = filtered.filter(d => d.year === currentYear);
    }

    if (currentSearch.trim()) {
      const q = currentSearch.trim().toLowerCase();
      filtered = filtered.filter(d =>
        d.title.toLowerCase().includes(q) ||
        d.desc.toLowerCase().includes(q) ||
        d.categoryLabel.toLowerCase().includes(q)
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = "";
      empty.style.display = "block";
      return;
    }

    empty.style.display = "none";

    /* 카테고리별 그룹핑 */
    const groups = {};
    filtered.forEach(d => {
      if (!groups[d.category]) {
        groups[d.category] = { label: d.categoryLabel, items: [] };
      }
      groups[d.category].items.push(d);
    });

    let html = "";
    Object.values(groups).forEach(group => {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-title">${group.label}</div>
            <div class="section-line"></div>
            <div class="section-count">${group.items.length}</div>
          </div>
          <div class="grid">
      `;

      group.items.forEach(d => {
        const deprecatedClass = d.status === "deprecated" ? " is-deprecated" : "";
        const statusPill = d.status === "deprecated"
          ? `<span class="status-pill deprecated">DEPRECATED</span>`
          : `<span class="status-pill active">ACTIVE</span>`;

        const yearTag = (d.category === "plan" && d.year)
          ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:6px;letter-spacing:0.05em;">${d.year}</span>`
          : "";

        html += `
          <a class="card${deprecatedClass}" href="${d.url}" target="_blank" rel="noopener noreferrer">
            <div class="card-top">
              <div class="card-type">
                <div class="card-type-icon ${d.type}">${getTypeIcon(d.type)}</div>
                <span class="card-type-label ${d.type}">${d.typeLabel}</span>
                ${yearTag}
              </div>
              ${statusPill}
            </div>
            <div class="card-title">${d.title}</div>
            <div class="card-desc">${d.desc}</div>
            <div class="card-footer">
              <div class="card-url">${d.shortUrl}</div>
              <svg class="card-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </a>
        `;
      });

      html += `</div></div>`;
    });

    container.innerHTML = html;
  }

  /* ── 테마 ── */
  function setTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("btn-dark").classList.toggle("active",  theme === "dark");
    document.getElementById("btn-light").classList.toggle("active", theme === "light");
    localStorage.setItem("lab-theme", theme);
  }

  /* ── 초기화 ── */
  const savedTheme = localStorage.getItem("lab-theme") || "dark";
  setTheme(savedTheme);
  updateTabCounts();
  renderCards();
</script>
</body>
</html>
